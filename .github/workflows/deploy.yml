name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /opt/amazonNow

            sudo git pull origin main

            cd frontend
            sudo npm install
            sudo npm run build
            sudo systemctl restart amznow-web

            cd ../backend
            sudo systemctl restart amznow-api
