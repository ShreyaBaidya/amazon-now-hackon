script: |
  set -e

  cd /opt/amazonNow

  git fetch origin
  git reset --hard origin/main

  # backend safety
  cd backend
  /root/.local/bin/uv sync || true

  # frontend
  cd ../frontend
  pnpm install
  pnpm build

  # restart services
  sudo systemctl restart amznow-api
  sudo systemctl restart amznow-web

  # health check
  sleep 5
  curl -f http://localhost:8010/api/bootstrap
