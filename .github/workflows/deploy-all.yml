name: Deploy App to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 3.88.127.234
        username: ubuntu
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          # 1. Move to the repository root and pull latest code
          cd /home/ubuntu/projects
          git pull origin main
          
          # 2. Navigate to frontend, install tools, and build
          cd frontend
          sudo npm install -g pnpm
          pnpm install
          pnpm exec next build

          # 3. Stop old background next processes and start fresh
          pkill -f "next-server" || true
          nohup pnpm exec next start -p 3100 > next.log 2>&1 &
